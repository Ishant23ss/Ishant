<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIVE Club — Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">🐝</div>
                <h1 class="login-title">HIVE Club</h1>
                <p class="login-subtitle">Admin Portal</p>
            </div>
            <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
                </div>
                <div id="loginError" class="login-error" style="display:none;">
                    Invalid username or password.
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>
        </div>
    </div>

    <script>
        const ADMIN_CREDENTIALS = {
            username: 'hive4',
            password: 'hive2026'
        };

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                sessionStorage.setItem('hiveAdmin', 'true');
                window.location.href = 'loyalty-admin.html';
            } else {
                errorEl.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }

        // Redirect if already logged in
        if (sessionStorage.getItem('hiveAdmin') === 'true') {
            window.location.href = 'loyalty-admin.html';
        }
    </script>
</body>
</html>
