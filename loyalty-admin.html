<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIVE Club — Loyalty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
    <!-- Header -->
    <header class="admin-header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-icon">🐝</span>
                <span class="brand-name">HIVE Club</span>
                <span class="brand-sub">Loyalty Admin</span>
            </div>
            <div class="header-actions">
                <input type="text" id="globalSearch" class="search-input" placeholder="Search player..." oninput="searchPlayers(this.value)">
                <button class="btn btn-outline" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="admin-main">
        <!-- Stats Row -->
        <section class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Players</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statActive">0</div>
                <div class="stat-label">Active Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statPoints">0</div>
                <div class="stat-label">Points Issued</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCoupons">0</div>
                <div class="stat-label">Coupons Redeemed</div>
            </div>
        </section>

        <!-- Tab Navigation -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="players" onclick="switchTab('players', this)">Players</button>
            <button class="tab-btn" data-tab="add-player" onclick="switchTab('add-player', this)">Add Player</button>
            <button class="tab-btn" data-tab="coupons" onclick="switchTab('coupons', this)">Coupons</button>
        </nav>

        <!-- Players Tab -->
        <section id="tab-players" class="tab-content active">
            <div class="section-header">
                <h2>Player Cards</h2>
            </div>
            <div class="players-grid" id="playersGrid">
                <!-- Player cards rendered here -->
            </div>
            <p id="noPlayersMsg" class="empty-msg" style="display:none;">No players found.</p>
        </section>

        <!-- Add Player Tab -->
        <section id="tab-add-player" class="tab-content">
            <div class="form-card">
                <h2>Add New Player</h2>
                <form id="addPlayerForm" onsubmit="addPlayer(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="playerName" placeholder="Player name" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="playerPhone" placeholder="Phone number" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="playerEmail" placeholder="Email address">
                        </div>
                        <div class="form-group">
                            <label>Membership Type</label>
                            <select id="playerMembership">
                                <option value="non-member">Non Member</option>
                                <option value="member">Member</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Player Card</button>
                </form>
            </div>
        </section>

        <!-- Coupons Tab -->
        <section id="tab-coupons" class="tab-content">
            <div class="section-header">
                <h2>Coupons</h2>
                <button class="btn btn-primary" onclick="openCouponModal()">+ New Coupon</button>
            </div>
            <div class="table-scroll">
                <table class="coupon-table" id="couponTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Description</th>
                            <th>Points Required</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="couponTableBody">
                    </tbody>
                </table>
            </div>
            <p id="noCouponsMsg" class="empty-msg" style="display:none;">No coupons yet.</p>
        </section>
    </main>

    <!-- Add Points Modal -->
    <div id="addPointsModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>Add Points</h3>
                <button class="modal-close" onclick="closeModal('addPointsModal')">✕</button>
            </div>
            <div class="modal-body">
                <p id="addPointsPlayerName" class="modal-player-name"></p>
                <form id="addPointsForm" onsubmit="submitAddPoints(event)">
                    <input type="hidden" id="addPointsCardId">
                    <div class="form-group">
                        <label>Activity Type</label>
                        <select id="activityType" onchange="updatePointsPreview()">
                            <option value="open-member" data-points="50">Open Member (50 pts/hr)</option>
                            <option value="open-non-member" data-points="25">Open Non Member (25 pts/hr)</option>
                            <option value="member-peak" data-points="120">Member Peak (120 pts/hr)</option>
                            <option value="member-non-peak" data-points="140">Member Non Peak (140 pts/hr)</option>
                            <option value="non-member-peak" data-points="60">Non Member Peak (60 pts/hr)</option>
                            <option value="non-member-non-peak" data-points="80">Non Member Non Peak (80 pts/hr)</option>
                            <option value="kettlebell" data-points="50">Kettlebell (50 pts/hr)</option>
                            <option value="arc" data-points="150">ARC (150 pts/hr)</option>
                            <option value="google-review" data-points="25">Google Review (25 pts flat)</option>
                        </select>
                    </div>
                    <div class="form-group" id="hoursGroup">
                        <label>Hours Played</label>
                        <input type="number" id="hoursPlayed" min="0.5" step="0.5" placeholder="Hours Played" value="1" oninput="updatePointsPreview()">
                    </div>
                    <div class="points-preview" id="pointsPreview">
                        <span class="preview-label">Points to add:</span>
                        <span class="preview-value" id="previewValue">50</span>
                    </div>
                    <div class="form-group">
                        <label>Note (optional)</label>
                        <input type="text" id="pointsNote" placeholder="e.g. Tuesday session">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-outline" onclick="closeModal('addPointsModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Points</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Player Detail Modal -->
    <div id="playerDetailModal" class="modal-overlay" style="display:none;">
        <div class="modal modal-wide">
            <div class="modal-header">
                <h3>Player Details</h3>
                <button class="modal-close" onclick="closeModal('playerDetailModal')">✕</button>
            </div>
            <div class="modal-body" id="playerDetailBody">
            </div>
        </div>
    </div>

    <!-- Coupon Modal -->
    <div id="couponModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>New Coupon</h3>
                <button class="modal-close" onclick="closeModal('couponModal')">✕</button>
            </div>
            <div class="modal-body">
                <form id="couponForm" onsubmit="saveCoupon(event)">
                    <div class="form-group">
                        <label>Coupon Code</label>
                        <input type="text" id="couponCode" placeholder="e.g. HIVE100" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="couponDesc" placeholder="What does this coupon give?" required>
                    </div>
                    <div class="form-group">
                        <label>Points Required</label>
                        <input type="number" id="couponPoints" min="1" placeholder="Points needed to redeem" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-outline" onclick="closeModal('couponModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Coupon</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="loyalty-admin.js"></script>
</body>
</html>
